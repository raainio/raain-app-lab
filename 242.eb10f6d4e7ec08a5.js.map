<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
      <ion-img src="assets/icon/favicon.ico" style="height: 30px; padding-left: 20px"></ion-img>
    </ion-buttons>
    <ion-title>
      Profile
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-refresher (ionRefresh)="refresh()" slot="fixed">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-card>
    <ion-card-header>
      <ion-card-title></ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ul>
        <li>email: {{ email }}</li>
        <li>endpoint: {{ defaultEndpointUrl }}</li>
        <li>roles: {{ roles }}</li>
      </ul>
    </ion-card-content>
  </ion-card>

  <span style="float:right;font-size:10px;">version: {{ appVersion }} : {{ apiVersion }} ({{ apiUrl }})</span>


</ion-content>
