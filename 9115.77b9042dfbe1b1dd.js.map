<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
            <ion-img src="assets/icon/favicon.ico" style="height: 30px; padding-left: 20px"></ion-img>

        </ion-buttons>
        <ion-title>
            Radar To Rain - Details
        </ion-title>

        <ion-buttons *ngIf="isSimpleZone" slot="end">
            <ion-label color="warning" slot="end">Admin Data</ion-label>
            <ion-toggle (ionChange)="toggleAdminChanged($event)"
                        [(ngModel)]="toggleAdmin"
                        [checked]="toggleAdmin"
                        color="warning"
                        slot="end">
            </ion-toggle>
        </ion-buttons>

    </ion-toolbar>
</ion-header>

<ion-content>

    <ion-refresher (ionRefresh)="refresh($event)" slot="fixed">
        <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <raain-details *ngIf="toggleDetails"
                   [compareManager]="compareManager"
                   [profileService]="profileService"
                   [radarService]="radarService"
                   [rainNode]="rainNode"
                   [refreshManager]="refreshManager"
                   [reportManager]="reportManager"
                   [toggleAdmin]="toggleAdmin">
    </raain-details>

    <ion-modal trigger="open-modal">
        <ng-template>
            <ion-header>
                <ion-toolbar>
                    <ion-title>Ask support</ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
                Any questions ?<br>
                <br>
                Feel free to ask the <a href="mailto:support@radartorain.com">support@radartorain.com</a>, with
                <ol>
                    <li>full screenshot (movie if you can)</li>
                    <li>your most detailed question</li>
                </ol>
                We will be happy to support you :)<br>
                <ion-button (click)="modal.dismiss()"
                            expand="block">ok
                </ion-button>
            </ion-content>
        </ng-template>
    </ion-modal>
    <ion-fab horizontal="end" slot="fixed" vertical="bottom">
        <ion-fab-button id="open-modal">
            <ion-icon name="help"></ion-icon>
        </ion-fab-button>
    </ion-fab>

    <span style="float:right;font-size:10px; padding-bottom: 70px;">{{ appVersion }}</span>

</ion-content>
