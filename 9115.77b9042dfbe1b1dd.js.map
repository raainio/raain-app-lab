<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
      <ion-img src="assets/icon/favicon.ico" style="height: 30px; padding-left: 20px"></ion-img>
    </ion-buttons>
    <ion-title>
      Rain zones
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-refresher (ionRefresh)="refresh($event)" slot="fixed">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-card *ngIf="!rainsInfoAlreadyViewed.hasOwnProperty('welcome-card')" class="welcome-card">
    <ion-card-header>
      <ion-card-title>Rain Zones</ion-card-title>
      <ion-card-subtitle>
        Based on radars, Rain zones are supporting rain computing.
      </ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p>Manage here rain computing status.</p>
    </ion-card-content>
    <ion-button (click)="closeInfo('welcome-card')" fill="outline">Got it</ion-button>
  </ion-card>

  <div *ngIf="rains.length">
    <ion-list>
      <ion-item-sliding *ngFor="let item of rains">
        <ion-item>
          <ion-icon *ngIf="(item | hasGoodQuality)" color="success" name="radio-button-off"
                    slot="start"></ion-icon>
          <ion-icon *ngIf="!(item | hasGoodQuality)" color="warning" name="radio-button-off"
                    slot="start"></ion-icon>

          <div style="min-width: 200px">{{ item.name }}</div>

          <ion-button (click)="clickOnRain(item)" expand="block">details</ion-button>

          <ion-progress-bar
            (click)="clickOnRain(item)"
            buffer="{{item | progressBuffer}}" color="primary"
            value="{{item | progressValue}}"></ion-progress-bar>
          <ion-icon (click)="clickOnRain(item)" color="primary" name="cloud-done" slot="end"></ion-icon>
          <ion-icon (click)="clickOnRain(item)" color="primary" name="arrow-right" slot="end"></ion-icon>
        </ion-item>

      </ion-item-sliding>
    </ion-list>
  </div>

  <span style="float:right;font-size:10px;">{{ appVersion }}</span>
</ion-content>
